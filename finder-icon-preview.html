<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Finder 图标选择</title>
<style>
body { font-family: -apple-system, sans-serif; background: #1e1e2e; color: #cdd6f4; padding: 40px; }
h2 { margin-bottom: 24px; }
.grid { display: flex; gap: 32px; flex-wrap: wrap; }
.option { text-align: center; padding: 20px; border-radius: 12px; border: 2px solid transparent; }
.option:hover { border-color: #89b4fa; background: #313244; }
svg { stroke: #cdd6f4; fill: none; stroke-linecap: round; stroke-linejoin: round; }
.label { margin-top: 12px; font-size: 13px; color: #a6adc8; }
.num { font-size: 18px; font-weight: bold; color: #89b4fa; margin-bottom: 8px; }
.preview { margin-top: 32px; padding: 16px; background: #181825; border-radius: 8px; }
.preview-label { font-size: 12px; color: #6c7086; margin-bottom: 12px; }
.preview-row { display: flex; align-items: center; gap: 6px; font-size: 12px; padding: 8px; background: #1e1e2e; border-radius: 4px; }
.preview-path { color: #cdd6f4; flex: 1; }
.preview-size { color: #6c7086; }
</style>
</head>
<body>
<h2>Finder 笑脸图标 — 选择样式</h2>
<div class="grid">

<div class="option">
<div class="num">A</div>
<!-- 圆角方框 + 笑脸 -->
<svg viewBox="0 0 24 24" width="48" height="48" stroke-width="1.5">
<rect x="3" y="3" width="18" height="18" rx="4"/>
<circle cx="9" cy="10" r="1" fill="#cdd6f4" stroke="none"/>
<circle cx="15" cy="10" r="1" fill="#cdd6f4" stroke="none"/>
<path d="M9 14c0 0 1.5 2 3 2s3-2 3-2"/>
</svg>
<div class="label">圆角方框 + 笑脸</div>
</div>

<div class="option">
<div class="num">B</div>
<!-- 纯圆形 + 笑脸 -->
<svg viewBox="0 0 24 24" width="48" height="48" stroke-width="1.5">
<circle cx="12" cy="12" r="9"/>
<circle cx="9" cy="11" r="1" fill="#cdd6f4" stroke="none"/>
<circle cx="15" cy="11" r="1" fill="#cdd6f4" stroke="none"/>
<path d="M9 15c0 0 1.5 2 3 2s3-2 3-2"/>
</svg>
<div class="label">圆形 + 笑脸</div>
</div>

<div class="option">
<div class="num">C</div>
<!-- 分脸设计（Finder 原版左右两半） -->
<svg viewBox="0 0 24 24" width="48" height="48" stroke-width="1.5">
<rect x="3" y="3" width="18" height="18" rx="4"/>
<line x1="12" y1="3" x2="12" y2="21" stroke-dasharray="1 2"/>
<circle cx="8.5" cy="10" r="1" fill="#cdd6f4" stroke="none"/>
<circle cx="15.5" cy="10" r="1" fill="#cdd6f4" stroke="none"/>
<path d="M8.5 14c0 0 1.5 2 3.5 2s3.5-2 3.5-2"/>
</svg>
<div class="label">分脸设计（经典 Finder）</div>
</div>

<div class="option">
<div class="num">D</div>
<!-- 极简笑脸（无外框） -->
<svg viewBox="0 0 24 24" width="48" height="48" stroke-width="1.5">
<circle cx="8" cy="10" r="1.5" fill="#cdd6f4" stroke="none"/>
<circle cx="16" cy="10" r="1.5" fill="#cdd6f4" stroke="none"/>
<path d="M7 15c0 0 2 3 5 3s5-3 5-3"/>
</svg>
<div class="label">极简笑脸（无外框）</div>
</div>

</div>

<div class="preview">
<div class="preview-label">实际效果预览（12px 尺寸）：</div>
<div class="preview-row">
<span>&#128193;</span>
<span class="preview-path">~/Library/Caches/com.apple.Safari</span>
<svg viewBox="0 0 24 24" width="12" height="12" stroke="#89b4fa" stroke-width="2">
<rect x="3" y="3" width="18" height="18" rx="4"/>
<circle cx="9" cy="10" r="1" fill="#89b4fa" stroke="none"/>
<circle cx="15" cy="10" r="1" fill="#89b4fa" stroke="none"/>
<path d="M9 14c0 0 1.5 2 3 2s3-2 3-2"/>
</svg>
<span class="preview-size">128 MB</span>
</div>
<div class="preview-row">
<span>&#128193;</span>
<span class="preview-path">~/Library/Application Support</span>
<svg viewBox="0 0 24 24" width="12" height="12" stroke="#89b4fa" stroke-width="2">
<rect x="3" y="3" width="18" height="18" rx="4"/>
<circle cx="9" cy="10" r="1" fill="#89b4fa" stroke="none"/>
<circle cx="15" cy="10" r="1" fill="#89b4fa" stroke="none"/>
<path d="M9 14c0 0 1.5 2 3 2s3-2 3-2"/>
</svg>
<span class="preview-size">256 MB</span>
</div>
</div>

</body>
</html>
